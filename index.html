<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gearblock Network | Coming Soon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --emerald: #2ecc71;
            --emerald-glow: rgba(46, 204, 113, 0.4);
            --glass-bg: rgba(15, 18, 15, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --blur: blur(16px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }

        body {
            background: #050505 url('https://media.forgecdn.net/attachments/257/822/2019-07-25_19.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .splash-container {
            max-width: 700px;
            width: 100%;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo { 
            font-size: 2rem; 
            font-weight: 800; 
            letter-spacing: -1px; 
            margin-bottom: 30px;
        }
        .logo span { color: var(--emerald); }

        h1 { 
            font-size: 3.5rem; 
            font-weight: 900; 
            margin-bottom: 15px; 
            line-height: 1.1;
        }
        h1 span { color: var(--emerald); }
        
        .sub-text { 
            color: var(--text-dim); 
            font-size: 1.2rem; 
            margin-bottom: 40px; 
            font-weight: 500;
        }

        /* Countdown Grid Styles */
        .countdown-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 50px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px 10px;
            backdrop-filter: blur(5px);
        }

        .time-box .number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-main);
            display: block;
            line-height: 1;
            margin-bottom: 5px;
        }

        .time-box .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--emerald);
            letter-spacing: 2px;
            font-weight: 700;
        }

        /* Continue Button */
        .continue-btn {
            display: inline-block;
            background: var(--emerald);
            color: #000 !important;
            font-weight: 800;
            padding: 16px 40px;
            border-radius: 12px;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px var(--emerald-glow);
            cursor: pointer;
            border: none;
            text-transform: uppercase;
            font-size: 0.95rem;
        }

        .continue-btn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 0 35px var(--emerald);
            filter: brightness(1.1);
        }

        @media (max-width: 500px) {
            h1 { font-size: 2.5rem; }
            .countdown-container { grid-template-columns: repeat(2, 1fr); }
            .time-box { padding: 15px 5px; }
            .time-box .number { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="splash-container">
        <div class="glass-panel">
            <div class="logo">GEAR<span>BLOCK</span></div>
            
            <h1>Something <span>New</span> Is Coming.</h1>
            <p class="sub-text">We are crafting an updated experience. Get ready for the next chapter.</p>
            
            <div class="countdown-container">
                <div class="time-box">
                    <span class="number" id="days">00</span>
                    <span class="label">Days</span>
                </div>
                <div class="time-box">
                    <span class="number" id="hours">00</span>
                    <span class="label">Hours</span>
                </div>
                <div class="time-box">
                    <span class="number" id="minutes">00</span>
                    <span class="label">Mins</span>
                </div>
                <div class="time-box">
                    <span class="number" id="seconds">00</span>
                    <span class="label">Secs</span>
                </div>
            </div>

            <a href="home.html" class="continue-btn">Continue to Website <i class="fas fa-arrow-right" style="margin-left: 8px;"></i></a>
        </div>
    </div>

    <script>
        // Set the countdown target date: July 1st, 2026 00:00:00
        const targetDate = new Date("July 1, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            // Time calculations for days, hours, minutes and seconds
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Output the results into the elements, adding leading zeros if number < 10
            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            // If the countdown is over, show all zeros
            if (difference < 0) {
                clearInterval(countdownInterval);
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
            }
        }

        // Run immediately on load, then tick every second
        updateCountdown();
        const countdownInterval = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
